name: Build Vicky Draw Library

on:
  push:
    branches: [main]
    paths:
      - 'stickers/**'
      - 'backgrounds/**'
      - 'scripts/build-library.js'
      - '.github/workflows/build-library.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-library:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/build-library.js
      - name: Commit library.json
        run: |
          if git diff --quiet library.json; then
            echo "library.json già aggiornato"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add library.json
            git commit -m "Update library index"
            git push
          fi
